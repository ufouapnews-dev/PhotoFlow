<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoFlow Upload PoC</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:600px;
    margin:40px auto;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    border:1px solid #ddd;
    padding:20px;
    border-radius:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
    margin-top:15px;
}

#preview{
    max-width:100%;
    margin-top:15px;
    display:none;
}

#result{
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>
<body>
<h2>Version 0.3.1</h2>
<h1>📸 PhotoFlow PoC</h1>

<div class="card">

<input
    type="file"
    id="fileInput"
    accept="image/*"
    multiple>

<br>

<img id="preview">

<br>

<button onclick="uploadImage()">
Subir Imagen
</button>

<div id="result"></div>
<div id="fileInfo"></div>
<div id="fileList"></div>
    
<progress
    id="progressBar"
    value="0"
    max="100"
    style="width:100%;display:none;margin-top:15px;">
</progress>
</div>

<script>

const WEBAPP_URL =
'https://script.google.com/macros/s/AKfycbyK_Ki7Vmqmr-7Dzi0ui-8KbmKn5_yQz8zYq_A10qR4fNpHh8Gl-AvF5Cq8m7cMvMCc4Q/exec';

const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const result = document.getElementById('result');
const fileInfo = document.getElementById('fileInfo');
const progressBar = document.getElementById('progressBar');

let selectedFiles = [];

fileInput.addEventListener('change', () => {

    selectedFiles =
    Array.from(fileInput.files);

    if(selectedFiles.length === 0)
        return;

    preview.style.display = 'none';

    let html = `
        <strong>
        ${selectedFiles.length}
        archivo(s) seleccionado(s)
        </strong>
        <br><br>
    `;

    selectedFiles.forEach(file => {

        html += `
            📸 ${file.name}
            (${(file.size/1024/1024).toFixed(2)} MB)
            <br>
        `;
    });

    fileList.innerHTML = html;
});

async function uploadImage(){

    if(selectedFiles.length === 0){

        alert('Selecciona al menos una imagen');
        return;
    }

    const button =
    document.querySelector('button');

    button.disabled = true;

    progressBar.style.display = 'block';

    let uploaded = 0;

    for(const file of selectedFiles){

        result.innerHTML = `
            📤 Subiendo
            ${uploaded + 1}
            de
            ${selectedFiles.length}
        `;

        const base64 =
        await fileToBase64(file);

        const payload = {

            fileName:file.name,
            mimeType:file.type,
            base64:base64

        };

        try{

            const response =
            await fetch(
                WEBAPP_URL,
                {
                    method:'POST',
                    body:JSON.stringify(payload)
                }
            );

            const data =
            await response.json();

            if(data.success){

    uploaded++;

    const seconds =
    (data.uploadTimeMs / 1000).toFixed(2);

    console.log(
        `${data.fileName} → ${seconds}s`
    );

    progressBar.value =
    Math.round(
        (uploaded /
        selectedFiles.length) * 100
    );

    result.innerHTML = `
        📸 ${data.fileName}<br>
        ✅ Subida completada<br>
        ⏱️ ${seconds} segundos
    `;
}
        }catch(error){

            console.error(error);
        }
    }

    result.innerHTML = `
        ✅ ${uploaded}
        archivo(s) cargado(s)
        correctamente
    `;

    button.disabled = false;

    selectedFiles = [];

}
function fileToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader =
        new FileReader();

        reader.onload = () => {

            resolve(
                reader.result.split(',')[1]
            );
        };

        reader.onerror = reject;

        reader.readAsDataURL(file);
    });
}
</script>

</body>
</html>
